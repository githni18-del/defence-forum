<!DOCTYPE html>
<html>
<head>
<title>Admin - DSA 2026</title>

<style>
body {
    background: linear-gradient(135deg, #0a192f, #020c1b);
    color: #e6f1ff;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Container */
.container {
    margin-top: 60px;
    padding: 30px;
}

/* Title Styling */
h1 {
    font-size: 32px;
    color: #00ffe0;
    text-shadow: 0 0 10px #00ffe0;
}

h2, h3 {
    color: #64ffda;
}

/* Inputs & Buttons */
input, button {
    width: 260px;
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* Input style */
input {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid #00ffe0;
}

/* Button style */
button {
    background: linear-gradient(135deg, #00ffe0, #0077ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffe0;
}

/* Glass Card Effect */
#screen {
    margin-top: 30px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,224,0.2);
}

/* Question Box */
.question-box {
    border-left: 4px solid #00ffe0;
    margin: 15px auto;
    padding: 15px;
    width: 60%;
    text-align: left;
    font-size: 18px;
    border-radius: 10px;
    background: rgba(0, 255, 224, 0.05);
    box-shadow: 0 0 10px rgba(0,255,224,0.1);
    transition: 0.3s;
}

.question-box:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(0,255,224,0.3);
}

/* Sub text */
p {
    color: #8892b0;
}
</style>
</head>

<body>
<div class="container">

<h1>🛡️ Forum DSA 2026 Q&A</h1>
<p>23 April 2026 (Morning Session)</p>
<p>FSTP, UPNM</p>
<p><i>AI & Cyber Security as the Vanguard of Digital Defence</i></p>

<h2>Admin Display</h2>

<div id="login">
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="screen" style="display:none;">
    <h3>Live Questions</h3>
    <div id="display"></div>
</div>

</div>

<script>
function login(){
    if(document.getElementById("pass").value === "admin123"){
        document.getElementById("screen").style.display="block";
        showQ();
        setInterval(showQ, 2000);
    } else {
        alert("Wrong password");
    }
}

function showQ(){
    let data = JSON.parse(localStorage.getItem("questions")) || [];
    let html = "";

    data.forEach(q=>{
        html += `<div class="question-box">${q.question}</div>`;
    });

    document.getElementById("display").innerHTML = html;
}
</script>

</body>
</html>
