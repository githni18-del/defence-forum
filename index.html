<!DOCTYPE html>
<html>
<head>
<title>DSA 2026 Q&A</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0a192f, #020c1b);
    color: #e6f1ff;
    text-align: center;
    font-family: 'Poppins', sans-serif;
}

.container {
    width: 350px;
    margin: 60px auto;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,255,224,0.2);
}

h1 {
    font-family: 'Orbitron', sans-serif;
    color: #00ffe0;
}

input, textarea, button {
    width: 280px;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

input, textarea {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid #00ffe0;
}

textarea { height: 120px; }

button {
    background: linear-gradient(135deg, #00ffe0, #0077ff);
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ DSA 2026 Q&A</h1>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<textarea id="question" placeholder="Your Question"></textarea>

<button onclick="submitQ()">Submit Question</button>

<br><br>

<button onclick="goModerator()">🧑‍💼 Moderator</button>
<button onclick="goAdmin()">🛡️ Admin</button>

</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDVYsoLRzVrP67_7VJNcwyDuYHR6nfjROY",
  authDomain: "dsa-qna-githni.firebaseapp.com",
  projectId: "dsa-qna-githni",
  databaseURL: "https://dsa-qna-githni-default-rtdb.firebaseio.com/",
  storageBucket: "dsa-qna-githni.appspot.com",
  messagingSenderId: "852345859398",
  appId: "1:852345859398:web:1ec1b1db15aa70e92d4947"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// submit question (REAL TIME)
function submitQ(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let question = document.getElementById("question").value;

    if(!name || !email || !phone || !question){
        alert("Fill all fields");
        return;
    }

    db.ref("questions").push({
        name, email, phone, question
    });

    alert("Question sent LIVE!");

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("question").value = "";
}

function goModerator(){
    window.open("moderator.html", "_blank");
}

function goAdmin(){
    window.open("admin.html", "_blank");
}
</script>

</body>
</html>
