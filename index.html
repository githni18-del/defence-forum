<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<title>DSA 2026 Q&A</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0a192f, #020c1b);
    color: #e6f1ff;
    text-align: center;
    font-family: 'Poppins', sans-serif;
}

.container {
    width: 350px;
    margin: 60px auto;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,255,224,0.2);
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    color: #00ffe0;
    text-shadow: 0 0 12px #00ffe0;
}

p {
    color: #8892b0;
}

input, textarea, button {
    width: 280px;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

input, textarea {
    background: rgba(255,255,255,0.05);
    color: white;
    border: 1px solid #00ffe0;
}

textarea {
    height: 120px;
    resize: none;
}

button {
    background: linear-gradient(135deg, #00ffe0, #0077ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00ffe0;
}

/* error text */
.error {
    color: red;
    font-size: 12px;
    margin-top: -5px;
    margin-bottom: 5px;
}

/* spacing for navigation buttons */
.nav {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Forum DSA 2026 Q&A</h1>
<p>23 April 2026 (Morning Session)</p>
<p>FSTP, UPNM</p>
<p><i>AI & Cyber Security as the Vanguard of Digital Defence</i></p>

<h2>Audience</h2>

<input id="name" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input id="email" placeholder="Email">
<div id="emailError" class="error"></div>

<input id="phone" placeholder="Phone">
<div id="phoneError" class="error"></div>

<textarea id="question" placeholder="Your Question"></textarea>
<div id="questionError" class="error"></div>

<button onclick="submitQ()">Submit Question</button>

<!-- 🔥 NEW NAVIGATION BUTTONS -->
<div class="nav">
    <button onclick="goModerator()">🛡️ Admin Portal</button>
    <button onclick="goAdmin()">🧑‍💼 Moderator Portal</button>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDVYsoLRzVrP67_7VJNcwyDuYHR6nfjROY",
  authDomain: "dsa-qna-githni.firebaseapp.com",
  databaseURL: "https://dsa-qna-githni-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "dsa-qna-githni",
  storageBucket: "dsa-qna-githni.firebasestorage.app",
  messagingSenderId: "852345859398",
  appId: "1:852345859398:web:1ec1b1db15aa70e92d4947"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function submitQ(){

    let nameVal = document.getElementById("name").value.trim();
    let emailVal = document.getElementById("email").value.trim();
    let phoneVal = document.getElementById("phone").value.trim();
    let questionVal = document.getElementById("question").value.trim();

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("phoneError").innerText = "";
    document.getElementById("questionError").innerText = "";

    let valid = true;

    if(nameVal === ""){
        document.getElementById("nameError").innerText = "⚠ Full Name is required";
        valid = false;
    }

    if(emailVal === ""){
        document.getElementById("emailError").innerText = "⚠ Email is required";
        valid = false;
    }

    if(phoneVal === ""){
        document.getElementById("phoneError").innerText = "⚠ Phone number is required";
        valid = false;
    }

    if(questionVal === ""){
        document.getElementById("questionError").innerText = "⚠ Question is required";
        valid = false;
    }

    if(phoneVal !== "" && !/^\d+$/.test(phoneVal)){
        document.getElementById("phoneError").innerText = "⚠ Phone must contain numbers only";
        valid = false;
    }

    if(!valid) return;

    db.ref("questions").push({
    name: nameVal,
    email: emailVal,
    phone: phoneVal,
    question: questionVal
});

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("question").value = "";

    alert("Question submitted successfully!");
}

function goModerator(){
    window.open("moderator.html", "_blank");
}

function goAdmin(){
    window.open("admin.html", "_blank");
}
</script>

</body>
</html>
